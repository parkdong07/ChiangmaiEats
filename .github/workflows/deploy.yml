name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Supabase Keys
        run: |
          sed -i "s/GITHUB_INJECT_SUPABASE_URL/${{ secrets.SUPABASE_URL }}/g" index.html
          sed -i "s/GITHUB_INJECT_SUPABASE_ANON_KEY/${{ secrets.SUPABASE_ANON_KEY }}/g" index.html

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
